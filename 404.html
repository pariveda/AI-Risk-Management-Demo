<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found · AI Governance Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&amp;display=swap" rel="stylesheet">
  <style>
    :root{
      --midnight:#010F31; --logo:#1C2C80; --indigo:#1A57D6; --vibrant:#2C75FF;
      --bg:#F7F8FC; --card:#FFFFFF; --brd:#E9EAEC; --text:#101935; --t2:#5A6072;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{text-align:center;max-width:520px}
    .code{font-family:'Outfit';font-weight:800;font-size:88px;line-height:1;letter-spacing:-2px;
      color:var(--logo)}
    h1{font-family:'Outfit';font-weight:700;font-size:22px;margin:14px 0 8px;color:var(--midnight)}
    p{font-size:15px;color:var(--t2);margin-bottom:24px}
    a.home{display:inline-block;font-family:'DM Sans';font-weight:600;font-size:14px;
      color:#fff;background:var(--logo);text-decoration:none;padding:11px 22px;border-radius:100px;
      transition:background .2s}
    a.home:hover{background:var(--indigo)}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you’re looking for doesn’t exist or may have moved.</p>
    <a class="home" href="/index.html">Back to AI Governance Hub</a>
  </main>
</body>
</html>
